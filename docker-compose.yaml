services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: pkms-redis
    ports:
      - "6379:6379"        # 可选：映射到宿主机便于调试
    volumes:
      - redis-data:/data   # 持久化 Redis 数据
    restart: unless-stopped
    networks:
      - pkms-network

  # Flask Web 应用
  web:
    build: .
    container_name: pkms-web
    # 生产环境无需映射端口，通过 Nginx 访问
    expose:
      - "5000"
    environment:
      - REDIS_URL=redis://redis:6379/0   # 容器内通过服务名访问 Redis
      - FLASK_ENV=production
    env_file:
      - .env                # 加载环境变量
    depends_on:
      - redis
    volumes:
      # 开发时可挂载代码实现热重载（生产环境建议去掉）
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./instance/app.db:/app/instance/app.db   # 挂载 SQLite 数据库文件
    restart: unless-stopped
    networks:
      - pkms-network

  # Celery Worker
  worker:
    build: .
    container_name: pkms-worker
    command: celery -A app.celery_worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
      - web
    volumes:
      - ./app:/app/app
      - ./instance/app.db:/app/instance/app.db
    restart: unless-stopped
    networks:
      - pkms-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pkms-nginx
    ports:
      - "80:80"             # 将宿主机 80 端口映射到 Nginx 容器
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro   # 挂载静态文件目录
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - pkms-network

networks:
  pkms-network:
    driver: bridge

volumes:
  redis-data: