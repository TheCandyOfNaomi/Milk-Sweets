server {
    listen 80;
    server_name localhost;  # 改成你的域名或 IP

    # 静态文件目录
    location /static/ {
        alias /app/static/;  
    }

    # 将其他所有请求转发给 Flask 应用
    location / {
        proxy_pass http://web:5000;  # web 是 docker-compose 中 Flask 服务的名称
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}